<!DOCTYPE html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login va Sign Up</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="nav container">
        <strong>Fakultet News</strong>
        <div class="links">
          <a href="index.html">Bosh sahifa</a>
          <a href="news.html">Yangiliklar</a>
          <a href="about.html">Biz haqimizda</a>
          <a href="contact.html">Aloqa</a>
          <a class="active" href="login.html">Login/Sign Up</a>
        </div>
        <div>
          <span id="userBox" class="msg"></span>
          <button id="logoutBtn" class="primary hidden">Logout</button>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="card">
        <h2>Login</h2>
        <form id="loginForm">
          <input id="loginEmail" type="email" placeholder="Email" required />
          <input id="loginPassword" type="password" placeholder="Parol" required />
          <button class="primary" type="submit">Kirish</button>
        </form>
        <p id="loginMsg" class="msg"></p>
      </section>

      <section class="card">
        <h2>Sign Up</h2>
        <form id="signupForm">
          <input id="signupName" type="text" placeholder="To'liq ism" required />
          <input id="signupEmail" type="email" placeholder="Email" required />
          <input id="signupPassword" type="password" placeholder="Parol" required />
          <button class="primary" type="submit">Ro'yxatdan o'tish</button>
        </form>
        <p id="signupMsg" class="msg"></p>
      </section>
    </main>

    <footer>
      <small>&copy; <span id="year"></span> Fakultet News</small>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
